<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CraftTale</title>
<link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>

	<svg class="logo" width="100" height="100">
		<rect width="100" height="100" style="fill:rgba(132,74,24,1);"/>
		<rect width="50" height="100" style="fill:rgba(159,92,37,1);"/>
		<rect width="100" height="30" style="fill:rgba(0,118,58,1);"/>
		<rect width="50" height="30" style="fill:rgba(0,170,84,1);"/>
	</svg>
	<h1>CraftTale</h1>
	
	<img class="headimg" src="mainimg.png">
	
	<div class="buttons">
		<a href="https://psycheer.github.io/">Domov</a>
		<a href="https://psycheer.github.io/nabor.html">Nábor</a>
		<a href="https://psycheer.github.io/">Domov</a>
		<a href="https://psycheer.github.io/">Domov</a>

	<div class="body">
		Prebieha nábor...<br>
		Ak chceš byť súčasťou admin teamu na serveri, neváhaj a ozvi sa!
		<center><section id="contact">
					<div class="content">
						<div id="form">
							<form action="" id="contactForm" method="post">
								<span>Meno</span>
								<input type="text" name="name" class="name" placeholder="Meno a priezvisko" tabindex="1" />
								<span>Email</span>
								<input type="text" name="email" class="email" placeholder="Email" tabindex="2" />
								<span>Správa</span>
								<input type="text" name="message" class="message" placeholder="Nick v hre, vek" tabindex="3" />
								<input type="submit" name="submit" value="Send e-mail" class="submit" tabindex="5">
							</form>
						</div>
					</div>
			</section>
		</center>
	</div>
	<div class="footer">
		<div class="buttons">
			<a href="" class="facebook">Facebook</a>	
			<a href="" class="youtube">YouTube</a>
		</div>
		<p>Coded by Psycheer. Images by Psycheer. ©2019 All rights reserved.</p>
	</div>
</body>
</html>
